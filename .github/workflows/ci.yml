name: build-check

# Safety net: every push validates the WHOLE NixOS config in the cloud.
# Green here => every package name, option, module, and custom-package hash is
# valid and it will build on your PC. (A full 10GB+ closure build doesn't fit a
# free runner, so the gate is: flake check + full EVAL + build our custom pkgs.)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reclaim ~20GB on the runner (drop Android SDK, .NET, etc.) so Nix has room.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # 1. Flake structure + all inputs resolve. (No --no-build: Stylix uses IFD.)
      - name: nix flake check
        run: nix flake check

      # 2. FULL EVAL of the system closure — the real correctness gate. Forces
      #    evaluation of every module/option/package reference. Catches removed/
      #    renamed packages, bad options, conflicts, missing args. (This is what
      #    caught plasma-manager rename, stremio/helvum removals, etc.)
      - name: evaluate full system (the gate)
        run: |
          nix eval --raw \
            ".#nixosConfigurations.nebula-ext.config.system.build.toplevel.drvPath"

      # 3. BUILD our custom packages — verifies opcode + cliamp hashes fetch/build.
      #    These are the only non-nixpkgs bits, so they're the real build risk;
      #    nixpkgs packages are cached.
      - name: build custom packages (opcode, cliamp, cursor)
        run: |
          nix build --no-link --print-out-paths \
            ".#nixosConfigurations.nebula-ext.pkgs.cliamp" \
            ".#nixosConfigurations.nebula-ext.pkgs.opcode" \
            ".#nixosConfigurations.nebula-ext.pkgs.win11-dark-cursors"
